services:
  identity-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: identity-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD:-YourStrong!Passw0rd}"
    ports:
      - "14333:1433"
    networks:
      - identity-network
    restart: unless-stopped
    volumes:
      - identity-sql-data:/var/opt/mssql

  identity-api:
    build:
      context: ./IdentityService
      dockerfile: Dockerfile
    container_name: identity-api
    depends_on:
      - identity-db
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__IdentityDB: "Server=identity-db,1433;Database=IdentityDB;User Id=sa;Password=${DB_PASSWORD:-YourStrong!Passw0rd};TrustServerCertificate=True;Encrypt=True"
      Jwt__SecretKey: "${JWT_SECRET_KEY:-YourSuperSecretKeyThatIsAtLeast32CharactersLongForHS256Algorithm}"
      Jwt__Issuer: "${JWT_ISSUER:-IdentityService}"
      Jwt__Audience: "${JWT_AUDIENCE:-IdentityServiceClient}"
      Jwt__ExpiryMinutes: "${JWT_EXPIRY_MINUTES:-60}"
      Jwt__RefreshTokenExpiryDays: "${JWT_REFRESH_TOKEN_EXPIRY_DAYS:-7}"
      EmailSettings__FromEmail: "${EMAIL_FROM:-genienguyen135@gmail.com}"
      EmailSettings__FromName: "${EMAIL_FROM_NAME:-Bach Hoa Xanh Security}"
      EmailSettings__SmtpHost: "${SMTP_HOST:-smtp.gmail.com}"
      EmailSettings__SmtpPort: "${SMTP_PORT:-587}"
      EmailSettings__SmtpUser: "${SMTP_USER:-genienguyen135@gmail.com}"
      EmailSettings__SmtpPassword: "${SMTP_PASSWORD:-zkwxeqolfggqpyvs}"
      Cors__AllowedOrigins__0: "${CORS_ORIGIN_1:-http://localhost:3000}"
      Cors__AllowedOrigins__1: "${CORS_ORIGIN_2:-http://localhost:4200}"
      Cors__AllowedOrigins__2: "${CORS_ORIGIN_3:-http://localhost:5173}"
    ports:
      - "5000:8080"
    networks:
      - identity-network
    restart: unless-stopped

  product-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: product-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${PRODUCT_DB_PASSWORD:-YourStrong!Passw0rd}"
    networks:
      - product-network
    restart: unless-stopped
    volumes:
      - product-sql-data:/var/opt/mssql

  product-api:
    build:
      context: ./ProductService
      dockerfile: Dockerfile
    container_name: product-api
    depends_on:
      - product-db
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=product-db,1433;Database=${PRODUCT_DB_NAME:-ProductDB};User Id=sa;Password=${PRODUCT_DB_PASSWORD:-YourStrong!Passw0rd};TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=true"
      JwtSettings__SecretKey: "${PRODUCT_JWT_SECRET_KEY:-YourSuperSecretKeyThatIsAtLeast32CharactersLongForHS256Algorithm}"
      JwtSettings__Issuer: "${PRODUCT_JWT_ISSUER:-IdentityService}"
      JwtSettings__Audience: "${PRODUCT_JWT_AUDIENCE:-IdentityServiceClient}"
      JwtSettings__ExpiryInMinutes: "${PRODUCT_JWT_EXPIRY_MINUTES:-60}"
      CloudinarySettings__CloudName: "${PRODUCT_CLOUDINARY_CLOUD_NAME:-dwuir1s4w}"
      CloudinarySettings__ApiKey: "${PRODUCT_CLOUDINARY_API_KEY:-291637823979115}"
      CloudinarySettings__ApiSecret: "${PRODUCT_CLOUDINARY_API_SECRET:-PgyV3HTMWTsz194iicucLbgpsIs}"
      Cors__AllowedOrigins__0: "${PRODUCT_CORS_ORIGIN_1:-http://localhost:3000}"
      Cors__AllowedOrigins__1: "${PRODUCT_CORS_ORIGIN_2:-http://localhost:4200}"
      Cors__AllowedOrigins__2: "${PRODUCT_CORS_ORIGIN_3:-http://localhost:5173}"
    ports:
      - "5001:8080"
    networks:
      - product-network
    restart: unless-stopped

  inventory-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: inventory-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${INVENTORY_DB_PASSWORD:-YourPassword123!}"
    networks:
      - inventory-network
    restart: unless-stopped
    volumes:
      - inventory-sql-data:/var/opt/mssql

  inventory-api:
    build:
      context: ./InventoryService
      dockerfile: Dockerfile
    container_name: inventory-api
    depends_on:
      - inventory-db
      - product-api
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=inventory-db,1433;Database=${INVENTORY_DB_NAME:-InventoryDB};User Id=sa;Password=${INVENTORY_DB_PASSWORD:-YourPassword123!};TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=true"
      Jwt__SecretKey: "${INVENTORY_JWT_SECRET_KEY:-YourSuperSecretKeyThatIsAtLeast32CharactersLongForHS256Algorithm}"
      Jwt__Issuer: "${INVENTORY_JWT_ISSUER:-IdentityService}"
      Jwt__Audience: "${INVENTORY_JWT_AUDIENCE:-IdentityServiceClient}"
      ServiceUrls__ProductService: "${PRODUCT_SERVICE_URL:-http://product-api:8080}"
      Cloudinary__CloudName: "${INVENTORY_CLOUDINARY_CLOUD_NAME:-dwuir1s4w}"
      Cloudinary__ApiKey: "${INVENTORY_CLOUDINARY_API_KEY:-291637823979115}"
      Cloudinary__ApiSecret: "${INVENTORY_CLOUDINARY_API_SECRET:-PgyV3HTMWTsz194iicucLbgpsIs}"
      AllowedHosts: "*"
    ports:
      - "5003:8080"
    networks:
      - inventory-network
      - product-network
    restart: unless-stopped

  pos-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: pos-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${POS_DB_PASSWORD:-YourPassword123!}"
    networks:
      - pos-network
    restart: unless-stopped
    volumes:
      - pos-sql-data:/var/opt/mssql

  pos-api:
    build:
      context: ./PosService
      dockerfile: Dockerfile
    container_name: pos-api
    depends_on:
      - pos-db
      - product-api
      - inventory-api
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PosDbConnection: "Server=pos-db,1433;Database=${POS_DB_NAME:-PosDB};User Id=sa;Password=${POS_DB_PASSWORD:-YourPassword123!};TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=true"
      JwtSettings__Secret: "${POS_JWT_SECRET:-YourSuperSecretKeyThatIsAtLeast32CharactersLongForHS256Algorithm}"
      JwtSettings__Issuer: "${POS_JWT_ISSUER:-IdentityService}"
      JwtSettings__Audience: "${POS_JWT_AUDIENCE:-IdentityServiceClient}"
      Services__ProductService__Url: "${POS_PRODUCT_SERVICE_URL:-http://product-api:8080}"
      Services__InventoryService__Url: "${POS_INVENTORY_SERVICE_URL:-http://inventory-api:8080}"
      Services__PromotionService__Url: "${POS_PROMOTION_SERVICE_URL:-http://promotion-api:8080}"
      Momo__PartnerCode: "${POS_MOMO_PARTNER_CODE:-MOMOBKUN20180529}"
      Momo__AccessKey: "${POS_MOMO_ACCESS_KEY:-klm05TvNBzhg7h7j}"
      Momo__SecretKey: "${POS_MOMO_SECRET_KEY:-at67qH6mk8w5Y1nAyMoYKMWACiEi2bsa}"
      Momo__Endpoint: "${POS_MOMO_ENDPOINT:-https://test-payment.momo.vn/v2/gateway/api/create}"
      Momo__ReturnUrl: "${POS_MOMO_RETURN_URL:-http://13.229.29.52:5006/api/payment/momo/return}"
      Momo__NotifyUrl: "${POS_MOMO_NOTIFY_URL:-http://13.229.29.52:5006/api/payment/momo/notify}"
      Momo__FrontendSuccessUrl: "${POS_FRONTEND_SUCCESS_URL:-http://localhost:3000/payment-success}"
      Momo__FrontendFailureUrl: "${POS_FRONTEND_FAILURE_URL:-http://localhost:3000/payment-failure}"
    ports:
      - "5006:8080"
    networks:
      - pos-network
      - product-network
      - inventory-network
    restart: unless-stopped

networks:
  identity-network:
    driver: bridge
  product-network:
    driver: bridge
  inventory-network:
    driver: bridge
  pos-network:
    driver: bridge

volumes:
  identity-sql-data:
  product-sql-data:
  inventory-sql-data:
  pos-sql-data:
