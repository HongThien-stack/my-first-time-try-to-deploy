services:
  identity-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: identity-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "14333:1433"
    networks:
      - identity-network
    restart: unless-stopped

  identity-api:
    build:
      context: ./IdentityService
      dockerfile: Dockerfile
    container_name: identity-api
    depends_on:
      - identity-db
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__IdentityDB: "Server=identity-db,1433;Database=IdentityDB;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;Encrypt=True"
      Jwt__SecretKey: "${JWT_SECRET_KEY:-YourSuperSecretKeyThatIsAtLeast32CharactersLongForHS256Algorithm}"
      Jwt__Issuer: "${JWT_ISSUER:-IdentityService}"
      Jwt__Audience: "${JWT_AUDIENCE:-IdentityServiceClient}"
      Jwt__ExpiryMinutes: "${JWT_EXPIRY_MINUTES:-60}"
      Jwt__RefreshTokenExpiryDays: "${JWT_REFRESH_TOKEN_EXPIRY_DAYS:-7}"
      EmailSettings__FromEmail: "${EMAIL_FROM:-noreply@bachhoxanh.com}"
      EmailSettings__FromName: "${EMAIL_FROM_NAME:-Bach Hoa Xanh}"
      EmailSettings__SmtpHost: "${SMTP_HOST:-smtp.gmail.com}"
      EmailSettings__SmtpPort: "${SMTP_PORT:-587}"
      EmailSettings__SmtpUser: "${SMTP_USER:-your-email@gmail.com}"
      EmailSettings__SmtpPassword: "${SMTP_PASSWORD:-your-app-password}"
      Cors__AllowedOrigins__0: "${CORS_ORIGIN_1:-http://localhost:3000}"
      Cors__AllowedOrigins__1: "${CORS_ORIGIN_2:-http://localhost:4200}"
      Cors__AllowedOrigins__2: "${CORS_ORIGIN_3:-http://localhost:5173}"
    ports:
      - "5000:8080"
    networks:
      - identity-network
    restart: unless-stopped

  product-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: product-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${PRODUCT_DB_PASSWORD:-YourStrong!Passw0rd}"
    networks:
      - product-network
    restart: unless-stopped
    volumes:
      - product-sql-data:/var/opt/mssql

  product-api:
    build:
      context: ./ProductService
      dockerfile: Dockerfile
    container_name: product-api
    depends_on:
      - product-db
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=product-db,1433;Database=${PRODUCT_DB_NAME:-ProductDB};User Id=sa;Password=${PRODUCT_DB_PASSWORD:-YourStrong!Passw0rd};TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=true"
      JwtSettings__SecretKey: "${PRODUCT_JWT_SECRET_KEY:-YourSuperSecretKeyThatIsAtLeast32CharactersLongForHS256Algorithm}"
      JwtSettings__Issuer: "${PRODUCT_JWT_ISSUER:-IdentityService}"
      JwtSettings__Audience: "${PRODUCT_JWT_AUDIENCE:-IdentityServiceClient}"
      JwtSettings__ExpiryInMinutes: "${PRODUCT_JWT_EXPIRY_MINUTES:-60}"
      CloudinarySettings__CloudName: "${PRODUCT_CLOUDINARY_CLOUD_NAME:-dwuir1s4w}"
      CloudinarySettings__ApiKey: "${PRODUCT_CLOUDINARY_API_KEY:-change-me}"
      CloudinarySettings__ApiSecret: "${PRODUCT_CLOUDINARY_API_SECRET:-change-me}"
      Cors__AllowedOrigins__0: "${PRODUCT_CORS_ORIGIN_1:-http://localhost:3000}"
      Cors__AllowedOrigins__1: "${PRODUCT_CORS_ORIGIN_2:-http://localhost:4200}"
      Cors__AllowedOrigins__2: "${PRODUCT_CORS_ORIGIN_3:-http://localhost:5173}"
    ports:
      - "5001:8080"
    networks:
      - product-network
    restart: unless-stopped

networks:
  identity-network:
    driver: bridge
  product-network:
    driver: bridge

volumes:
  product-sql-data:
